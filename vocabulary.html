<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Study Hub - Vocabulary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="main-nav">
        <a href="vocabulary.html" class="nav-btn active">📖 Vocabulary</a>
        <a href="grammar.html" class="nav-btn">📝 Grammar Guide</a>
        <a href="practice.html" class="nav-btn">🎮 Practice Mode</a>
    </nav>

    <div class="container">
        <header>
            <h1>日本語 Vocabulary Database</h1>
            <p>Explore words, definitions, and types with continuous sequence numbering.</p>
        </header>

        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="vocab-search" 
                    placeholder="🔍 Search by English, Kanji, Hiragana, or Romaji..."
                    autocomplete="off"
                >
            </div>
        </section>

        <main id="vocab-display-container">
            <div class="loading-state">Loading vocabulary database...</div>
        </main>
    </div>

    <script src="data.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const searchInput = document.getElementById("vocab-search");
            
            // Safe fallback checking if window.studyData exists
            const rawData = window.studyData || { verbs: [], adjectives: [], others: [] };

            // Initial render of all words
            renderVocabulary(rawData, "");

            // Real-time responsive search event listener
            searchInput.addEventListener("input", (e) => {
                const searchTerm = e.target.value.trim().toLowerCase();
                renderVocabulary(rawData, searchTerm);
            });
        });

        /**
         * Renders the vocabulary list categorized nicely with sequential absolute numbering
         */
        function renderVocabulary(data, filterText) {
            const container = document.getElementById("vocab-display-container");
            container.innerHTML = ""; // Clear existing UI content

            let globalCounter = 1; // Tracks item count continuously across ALL categories
            let totalMatchesFound = 0;

            // Loop through each vocabulary type (verbs, adjectives, others, etc.)
            Object.keys(data).forEach(categoryName => {
                const items = data[categoryName];
                
                // Filter items based on user input
                const filteredItems = items.filter(item => {
                    if (!filterText) return true;
                    
                    const kanji = (item.kanji || "").toLowerCase();
                    const kana = (item.kana || "").toLowerCase();
                    const romaji = (item.romaji || "").toLowerCase();
                    const english = (item.english || "").toLowerCase();

                    return kanji.includes(filterText) || 
                           kana.includes(filterText) || 
                           romaji.includes(filterText) || 
                           english.includes(filterText);
                });

                // If no matching items in this category, we skip drawing this specific category card
                if (filteredItems.length === 0) return;

                totalMatchesFound += filteredItems.length;

                // Create a clean layout container for the category
                const categoryCard = document.createElement("div");
                categoryCard.className = "vocab-category-card";

                // Format category title (e.g., "verbs" -> "Verbs")
                const capitalizedTitle = categoryName.charAt(0).toUpperCase() + categoryName.slice(1);
                
                let htmlContent = `
                    <h2 class="category-title">${capitalizedTitle}</h2>
                    <ul class="vocab-list">
                `;

                // Build each vocabulary item row
                filteredItems.forEach(item => {
                    htmlContent += `
                        <li class="vocab-item">
                            <span class="vocab-index">#${globalCounter}</span>
                            <div class="vocab-details">
                                <strong class="vocab-japanese">${item.kanji || item.kana}</strong> 
                                <span class="vocab-kana">(${item.kana})</span> 
                                <span class="vocab-romaji">/ ${item.romaji}</span>
                                <span class="vocab-separator">—</span>
                                <span class="vocab-english">${item.english}</span>
                            </div>
                        </li>
                    `;
                    globalCounter++; // Increment sequentially regardless of category shifts
                });

                htmlContent += `</ul>`;
                categoryCard.innerHTML = htmlContent;
                container.appendChild(categoryCard);
            });

            // Handled Edge Case: No words match the search string anywhere
            if (totalMatchesFound === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <p>❌ No entries matched your search for "<strong>${filterText}</strong>".</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
