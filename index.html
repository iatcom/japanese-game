<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Study Hub</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-menu button { padding: 10px 20px; border-radius: 20px; border: 2px solid var(--primary); background: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-menu button.active { background: var(--primary); color: white; }

        .card { background: white; width: 100%; max-width: 500px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .display-area { background: #f0f4f8; padding: 30px; border-radius: 15px; margin-bottom: 20px; }
        .main-word { font-size: 3rem; margin: 0; }
        .task-info { background: #fff9f0; padding: 15px; border-left: 5px solid #f39c12; text-align: left; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
        #submit-btn { background: var(--primary); }
        #next-btn { background: var(--success); display: none; }
        .feedback { margin-top: 15px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <div class="nav-menu" id="category-menu">
        <button onclick="setCategory('verbs')" id="cat-verbs" class="active">Verbs</button>
        <button onclick="setCategory('adjectives_i')" id="cat-adjectives_i">I-Adjectives</button>
        <button onclick="setCategory('days_week')" id="cat-days_week">Days of Week</button>
    </div>

    <div class="card">
        <div id="score-box" style="text-align: right; font-weight: bold; color: var(--primary);">Score: 0</div>
        
        <div class="display-area">
            <h1 class="main-word" id="display-word">---</h1>
            <p id="display-sub">---</p>
        </div>

        <div class="task-info" id="task-box">---</div>

        <input type="text" id="user-input" placeholder="Enter answer..." autocomplete="off">
        
        <div id="feedback" class="feedback"></div>

        <div class="controls">
            <button class="btn" id="submit-btn" onclick="check()">Check</button>
            <button class="btn" id="next-btn" onclick="next()">Next →</button>
        </div>
    </div>

    <!-- Link your external data file here -->
    <script src="data.js"></script>

    <script>
        let currentCat = 'verbs';
        let currentItem, currentTense, score = 0;
        let lastItem = null;

        function setCategory(cat) {
            currentCat = cat;
            document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('cat-' + cat).classList.add('active');
            next();
        }

        function next() {
            const list = studyData[currentCat];
            
            // Better Randomizer: Prevent immediate repeats
            do {
                currentItem = list[Math.floor(Math.random() * list.length)];
            } while (list.length > 1 && currentItem === lastItem);
            lastItem = currentItem;

            document.getElementById('display-word').innerText = currentItem.kanji;
            document.getElementById('display-sub').innerText = currentItem.dict;
            document.getElementById('feedback').innerText = "";
            document.getElementById('user-input').value = "";
            document.getElementById('user-input').disabled = false;
            document.getElementById('submit-btn').style.display = "block";
            document.getElementById('next-btn').style.display = "none";

            const taskBox = document.getElementById('task-box');
            
            if (tenses[currentCat]) {
                currentTense = tenses[currentCat][Math.floor(Math.random() * tenses[currentCat].length)];
                taskBox.innerHTML = `Conjugate to: <strong>${currentTense.label}</strong>`;
            } else {
                currentTense = null;
                taskBox.innerHTML = `Translate to: <strong>English</strong>`;
            }
            document.getElementById('user-input').focus();
        }

        function check() {
            const user = document.getElementById('user-input').value.toLowerCase().trim();
            let correct;

            if (currentTense) {
                correct = (currentItem.stem + currentTense.suffix).toLowerCase().replace(/\s/g, '');
            } else {
                correct = currentItem.eng.toLowerCase();
            }

            const feedback = document.getElementById('feedback');
            if (user.replace(/\s/g, '') === correct) {
                feedback.innerText = "Correct! ✨";
                feedback.style.color = "var(--success)";
                score++;
            } else {
                feedback.innerText = `Wrong! Answer: ${correct}`;
                feedback.style.color = "#dc2626";
            }

            document.getElementById('score-box').innerText = "Score: " + score;
            document.getElementById('user-input').disabled = true;
            document.getElementById('submit-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
        }

        // Initialize
        next();
    </script>
</body>
</html>
