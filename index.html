<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JP Study Hub</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f0f3f7; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .section-label { font-size: 0.8rem; text-transform: uppercase; color: #888; width: 100%; max-width: 450px; margin: 10px 0 5px 5px; font-weight: bold; }
        
        /* Horizontal scroll menus */
        .menu-scroll { display: flex; gap: 8px; overflow-x: auto; width: 100%; max-width: 450px; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .menu-scroll::-webkit-scrollbar { display: none; }
        .menu-scroll button { white-space: nowrap; padding: 10px 16px; border-radius: 20px; border: 2px solid var(--primary); background: white; font-weight: bold; font-size: 13px; flex-shrink: 0; cursor: pointer; }
        .menu-scroll button.active { background: var(--primary); color: white; }

        .card { background: var(--card); width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; margin-top: 10px; }
        .display-box { background: #f8fbff; padding: 35px 15px; border-radius: 20px; margin-bottom: 15px; text-align: center; border: 1px solid #eef2f8; }
        .main-word { font-size: 2.8rem; margin: 0; color: #1a1a1a; }
        .task-hint { background: #fff8eb; padding: 12px; border-radius: 12px; font-weight: bold; border-left: 5px solid #ffa500; margin-bottom: 15px; font-size: 14px; }
        
        input { width: 100%; padding: 16px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 14px; outline: none; box-sizing: border-box; -webkit-appearance: none; }
        input:focus { border-color: var(--primary); }

        .btn-row { margin-top: 15px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
        #submit-btn { background: var(--primary); }
        #reveal-btn { background: #e67e22; }
        #next-btn { background: #2ecc71; display: none; }
        .feedback { margin: 15px 0; text-align: center; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="section-label">1. Choose Mode</div>
    <div class="menu-scroll" id="mode-menu">
        <button onclick="setMode('en-jp')" id="m-en-jp">English → JP</button>
        <button onclick="setMode('jp-en')" id="m-jp-en">JP → English</button>
        <button onclick="setMode('conjugate')" id="m-conjugate" class="active">Conjugation</button>
    </div>

    <div class="section-label">2. Category</div>
    <div class="menu-scroll" id="cat-menu">
        <button onclick="setCat('verbs')" id="c-verbs" class="active">Verbs</button>
        <button onclick="setCat('adjectives')" id="c-adjectives">Adjectives</button>
        <button onclick="setCat('time')" id="c-time">Time</button>
        <button onclick="setCat('all')" id="c-all">All Vocabulary</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <div id="word-stats" style="color: #888; font-size: 12px; font-weight: bold;">Mastery: 0/10</div>
            <div id="score" style="color: var(--primary); font-weight: bold;">Session Score: 0</div>
        </div>
        
        <div class="display-box">
            <h1 class="main-word" id="w-main">---</h1>
            <p id="w-sub" style="color: #888; margin: 10px 0 0 0;">---</p>
        </div>

        <div class="task-hint" id="task">---</div>

        <input type="text" id="user-input" placeholder="Your answer..." spellcheck="false" autocomplete="off">
        
        <div id="feedback" class="feedback"></div>

        <div class="btn-row">
            <button class="btn" id="submit-btn" onclick="check()">Check Answer</button>
            <button class="btn" id="reveal-btn" onclick="reveal()">Reveal Answer 👁️</button>
            <button class="btn" id="next-btn" onclick="next()">Next Word →</button>
        </div>
    </div>

    <script>
        // Structured Separated JSON Database Keys Archetype
        const studyData = {
            verbs: [
                { dict: "Kiku", kanji: "聞く", eng: "Listen", group: 1, stem: "kiki" },
                { dict: "Oyogu", kanji: "泳ぐ", eng: "Swim", group: 1, stem: "oyogi" },
                { dict: "Hanasu", kanji: "話す", eng: "Talk", group: 1, stem: "hanashi" },
                { dict: "Yomu", kanji: "読む", eng: "Read", group: 1, stem: "yomi" },
                { dict: "Shinu", kanji: "死ぬ", eng: "Die", group: 1, stem: "shini" },
                { dict: "Yobu", kanji: "呼ぶ", eng: "Call", group: 1, stem: "yobi" },
                { dict: "Iu", kanji: "言う", eng: "Say", group: 1, stem: "ii" },
                { dict: "Matsu", kanji: "待つ", eng: "Wait", group: 1, stem: "machi" },
                { dict: "Toru", kanji: "取る", eng: "Take", group: 1, stem: "tori" },
                { dict: "Katsu", kanji: "勝つ", eng: "Win", group: 1, stem: "kachi" },
                { dict: "Au", kanji: "会う", eng: "Meet", group: 1, stem: "ai" },
                { dict: "Iku", kanji: "行く", eng: "Go", group: 1, stem: "iki" },
                { dict: "Nomu", kanji: "飲む", eng: "Drink", group: 1, stem: "nomi" },
                { dict: "Warau", kanji: "笑う", eng: "Laugh", group: 1, stem: "warai" },
                { dict: "Naku", kanji: "泣く", eng: "Cry", group: 1, stem: "naki" },
                { dict: "Odoru", kanji: "踊る", eng: "Dance", group: 1, stem: "odori" },
                { dict: "Kau", kanji: "買う", eng: "Buy", group: 1, stem: "kai" },
                { dict: "Tsukau", kanji: "使う", eng: "Use", group: 1, stem: "tsukai" },
                { dict: "Tsukuru", kanji: "作る", eng: "Make", group: 1, stem: "tsukuri" },
                { dict: "Kaku", kanji: "書く", eng: "Write", group: 1, stem: "kaki" },
                { dict: "Hashiru", kanji: "走る", eng: "Run", group: 1, stem: "hashi" },
                { dict: "Kaeru", kanji: "帰る", eng: "Return", group: 1, stem: "kaeri" },
                { dict: "Aru", kanji: "ある", eng: "Exist (inanimate)", group: 1, stem: "ari" },
                { dict: "Wakaru", kanji: "分かる", eng: "Understand", group: 1, stem: "wakari" },
                { dict: "Taberu", kanji: "食べる", eng: "Eat", group: 2, stem: "tabe" },
                { dict: "Neru", kanji: "寝る", eng: "Sleep", group: 2, stem: "ne" },
                { dict: "Miru", kanji: "見る", eng: "See", group: 2, stem: "mi" },
                { dict: "Okiru", kanji: "起きる", eng: "Wake", group: 2, stem: "oki" },
                { dict: "Oshieru", kanji: "教える", eng: "Teach", group: 2, stem: "oshie" },
                { dict: "Akeru", kanji: "開ける", eng: "Open", group: 2, stem: "ake" },
                { dict: "Shimeru", kanji: "閉める", eng: "Close", group: 2, stem: "shime" },
                { dict: "Oriru", kanji: "降りる", eng: "Get off", group: 2, stem: "ori" },
                { dict: "Iru", kanji: "いる", eng: "Exist (animate)", group: 2, stem: "i" },
                { dict: "Wasureru", kanji: "忘れる", eng: "Forget", group: 2, stem: "wasure" },
                { dict: "Suru", kanji: "する", eng: "Do", group: 3, stem: "shi" },
                { dict: "Kuru", kanji: "来る", eng: "Come", group: 3, stem: "ki" },
                { dict: "Benkyou suru", kanji: "勉強する", eng: "Study", group: 3, stem: "benkyoushi" },
                { dict: "Unten suru", kanji: "運転する", eng: "Drive", group: 3, stem: "untenshi" },
                { dict: "Kaimono suru", kanji: "買い物する", eng: "Shop", group: 3, stem: "kaimonoshi" },
                { dict: "Ryouri suru", kanji: "料理する", eng: "Cook", group: 3, stem: "ryourishi" }
            ],
            adjectives: [
                { dict: "Oishii", kanji: "美味しい", eng: "Delicious", type: "i", stem: "oishi" },
                { dict: "Takai", kanji: "高い", eng: "Expensive", type: "i", stem: "taka" },
                { dict: "Yasui", kanji: "安い", eng: "Cheap", type: "i", stem: "yasu" },
                { dict: "Samui", kanji: "寒い", eng: "Cold", type: "i", stem: "samu" },
                { dict: "Kirei", kanji: "綺麗", eng: "Pretty", type: "na" },
                { dict: "Shizuka", kanji: "静か", eng: "Quiet", type: "na" },
                { dict: "Genki", kanji: "元気", eng: "Healthy", type: "na" },
                { dict: "Atarashii", kanji: "新しい", eng: "New", type: "i", stem: "atarashi" },
                { dict: "Furui", kanji: "古い", eng: "Old", type: "i", stem: "furu" },
                { dict: "Atsui", kanji: "暑い", eng: "Hot", type: "i", stem: "atsu" },
                { dict: "Omoshiroi", kanji: "面白い", eng: "Interesting", type: "i", stem: "omoshiroi" },
                { dict: "Chiisai", kanji: "小さい", eng: "Small", type: "i", stem: "chiisa" },
                { dict: "Ookii", kanji: "大きい", eng: "Big", type: "i", stem: "ooki" },
                { dict: "Hayai", kanji: "早い", eng: "Fast", type: "i", stem: "haya" },
                { dict: "Muzukashii", kanji: "難しい", eng: "Difficult", type: "i", stem: "muzukashi" },
                { dict: "Hima", kanji: "暇", eng: "Free (time)", type: "na" },
                { dict: "Suki", kanji: "好き", eng: "Like", type: "na" },
                { dict: "Kirai", kanji: "嫌い", eng: "Dislike", type: "na" },
                { dict: "Benri", kanji: "便利", eng: "Convenient", type: "na" },
                { dict: "Nigiyaka", kanji: "賑やか", eng: "Lively", type: "na" }
            ],
            time: [
                { dict: "Getsuyoubi", kanji: "月曜日", eng: "Monday" },
                { dict: "Kayoubi", kanji: "火曜日", eng: "Tuesday" },
                { dict: "Suiyoubi", kanji: "水曜日", eng: "Wednesday" },
                { dict: "Mokuyoubi", kanji: "木曜日", eng: "Thursday" },
                { dict: "Kinyoubi", kanji: "金曜日", eng: "Friday" },
                { dict: "Douyoubi", kanji: "土曜日", eng: "Saturday" },
                { dict: "Nichiyoubi", kanji: "日曜日", eng: "Sunday" },
                { dict: "Tsuitachi", kanji: "1日", eng: "1st" },
                { dict: "Futsuka", kanji: "2日", eng: "2nd" },
                { dict: "Mikka", kanji: "3日", eng: "3rd" },
                { dict: "Yokka", kanji: "4日", eng: "4th" },
                { dict: "Itsuka", kanji: "5日", eng: "5th" },
                { dict: "Muika", kanji: "6日", eng: "6th" },
                { dict: "Nanoka", kanji: "7日", eng: "7th" },
                { dict: "Youka", kanji: "8日", eng: "8th" },
                { dict: "Kokonoka", kanji: "9日", eng: "9th" },
                { dict: "Touka", kanji: "10日", eng: "10th" },
                { dict: "Ichigatsu", kanji: "1月", eng: "January" },
                { dict: "Nigatsu", kanji: "2月", eng: "February" },
                { dict: "Sangatsu", kanji: "3月", eng: "March" },
                { dict: "Shigatsu", kanji: "4月", eng: "April" },
                { dict: "Gogatsu", kanji: "5月", eng: "May" },
                { dict: "Rokugatsu", kanji: "6月", eng: "June" },
                { dict: "Shichigatsu", kanji: "7月", eng: "July" },
                { dict: "Hachigatsu", kanji: "8月", eng: "August" },
                { dict: "Kugatsu", kanji: "9月", eng: "September" },
                { dict: "Juugatsu", kanji: "10月", eng: "October" },
                { dict: "Juuichigatsu", kanji: "11月", eng: "November" },
                { dict: "Juunigatsu", kanji: "12月", eng: "December" },
                { dict: "Kyou", kanji: "今日", eng: "Today" },
                { dict: "Kinou", kanji: "昨日", eng: "Yesterday" },
                { dict: "Ashita", kanji: "明日", eng: "Tomorrow" },
                { dict: "Mainichi", kanji: "毎日", eng: "Every day" },
                { dict: "Itsumo", kanji: "いつも", eng: "Always" },
                { dict: "Kesa", kanji: "今朝", eng: "This morning" },
                { dict: "Konban", kanji: "今晩", eng: "This evening" },
                { dict: "Konshuu", kanji: "今週", eng: "This week" },
                { dict: "Senshuu", kanji: "先週", eng: "Last week" },
                { dict: "Raishuu", kanji: "来週", eng: "Next week" },
                { dict: "Kongetsu", kanji: "今月", eng: "This month" },
                { dict: "Sengetsu", kanji: "先月", eng: "Last month" },
                { dict: "Raigetsu", kanji: "来月", eng: "Next month" },
                { dict: "Kotoshi", kanji: "今年", eng: "This year" },
                { dict: "Kyonen", kanji: "去年", eng: "Last year" },
                { dict: "Rainen", kanji: "来年", eng: "Next year" },
                { dict: "Tokidoki", kanji: "時々", eng: "Sometimes" }
            ],
            vocab: [
                { dict: "Inu", kanji: "犬", eng: "Dog" },
                { dict: "Neko", kanji: "猫", eng: "Cat" },
                { dict: "Tori", kanji: "鳥", eng: "Bird" },
                { dict: "Sakana", kanji: "魚", eng: "Fish" },
                { dict: "Uma", kanji: "馬", eng: "Horse" },
                { dict: "Gohan", kanji: "ご飯", eng: "Rice" },
                { dict: "Niku", kanji: "肉", eng: "Meat" },
                { dict: "Yasai", kanji: "野菜", eng: "Vegetable" },
                { dict: "Ringo", kanji: "りんご", eng: "Apple" },
                { dict: "Tamago", kanji: "卵", eng: "Egg" },
                { dict: "Tamanegi", kanji: "玉ねぎ", eng: "Onion" },
                { dict: "Me", kanji: "目", eng: "Eye" },
                { dict: "Mimi", kanji: "耳", eng: "Ear" },
                { dict: "Kuchi", kanji: "口", eng: "Mouth" },
                { dict: "Te", kanji: "手", eng: "Hand" },
                { dict: "Ashi", kanji: "足", eng: "Foot" },
                { dict: "Atama", kanji: "頭", eng: "Head" }
            ]
        };

        const masteryStorageKey = 'jp_study_mastery_scores_v1';
        let masteryScores = JSON.parse(localStorage.getItem(masteryStorageKey)) || {};

        function initMasteryProfiles() {
            Object.keys(studyData).forEach(catKey => {
                studyData[catKey].forEach(item => {
                    item.uid = `${catKey}_${item.dict.toLowerCase().replace(/\s/g, '')}_${item.eng.toLowerCase().replace(/\s/g, '')}`;
                    if (masteryScores[item.uid] === undefined) {
                        masteryScores[item.uid] = 0;
                    }
                });
            });
            localStorage.setItem(masteryStorageKey, JSON.stringify(masteryScores));
        }
        initMasteryProfiles();

        const tenses = {
            verbs: [
                { label: "Present Positive (+masu)", suffix: "masu" },
                { label: "Present Negative (+masen)", suffix: "masen" },
                { label: "Past Positive (+mashita)", suffix: "mashita" },
                { label: "Past Negative (+masen deshita)", suffix: "masen deshita" }
            ],
            adjectives: [
                { label: "Present Positive", type: "i", suffix: "idesu" },
                { label: "Present Negative", type: "i", suffix: "kunaidesu" },
                { label: "Present Positive", type: "na", suffix: "desu" },
                { label: "Present Negative", type: "na", suffix: "janai desu" }
            ]
        };

        let mode = 'conjugate', cat = 'verbs', score = 0, current;

        document.getElementById('user-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('submit-btn').style.display !== 'none') {
                    check();
                } else {
                    next();
                }
            }
        });

        function setMode(m) { mode = m; updateUI(); next(); }
        function setCat(c) { cat = c; updateUI(); next(); }

        function updateUI() {
            document.querySelectorAll('#mode-menu button').forEach(b => b.classList.toggle('active', b.id === 'm-'+mode));
            document.querySelectorAll('#cat-menu button').forEach(b => b.classList.toggle('active', b.id === 'c-'+cat));
        }

        function getCorrectAnswer() {
            if (mode === 'en-jp') {
                return current.dict;
            } else if (mode === 'jp-en') {
                return current.eng;
            } else {
                if (current.group) {
                    return current.stem + current.activeTense.suffix;
                } else if (current.type) {
                    return (current.type === 'i' ? current.stem : current.dict) + current.activeTense.suffix;
                } else { 
                    return current.eng; 
                }
            }
        }

        function pickWeightedItem(pool) {
            let itemsWithWeights = pool.map(item => {
                let score = masteryScores[item.uid] || 0;
                let weight = Math.pow(0.5, score); 
                return { item: item, weight: weight };
            });

            let totalWeight = itemsWithWeights.reduce((sum, el) => sum + el.weight, 0);
            let randomTarget = Math.random() * totalWeight;
            
            let runningSum = 0;
            for (let i = 0; i < itemsWithWeights.length; i++) {
                runningSum += itemsWithWeights[i].weight;
                if (randomTarget <= runningSum) {
                    return itemsWithWeights[i].item;
                }
            }
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function updateMasteryScore(amount) {
            if (!current || !current.uid) return;
            let currentScore = masteryScores[current.uid] || 0;
            currentScore += amount;
            
            if (currentScore < 0) currentScore = 0;
            if (currentScore > 10) currentScore = 10;
            
            masteryScores[current.uid] = currentScore;
            localStorage.setItem(masteryStorageKey, JSON.stringify(masteryScores));
            document.getElementById('word-stats').innerText = `Mastery: ${currentScore}/10`;
        }

        function reveal() {
            const correct = getCorrectAnswer();
            const fb = document.getElementById('feedback');
            fb.innerText = `The answer is: ${correct}`;
            fb.style.color = "#e67e22";
            
            updateMasteryScore(-1); 
            
            document.getElementById('submit-btn').style.display = "none";
            document.getElementById('reveal-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
            document.getElementById('user-input').disabled = true;
            document.getElementById('next-btn').focus();
        }

        function next() {
            let pool = [];
            if (cat === 'all') {
                pool = [...studyData.verbs, ...studyData.adjectives, ...studyData.time, ...studyData.vocab];
            } else {
                pool = studyData[cat];
            }

            current = pickWeightedItem(pool);
            
            document.getElementById('feedback').innerText = "";
            document.getElementById('user-input').value = "";
            document.getElementById('user-input').disabled = false;
            document.getElementById('submit-btn').style.display = "block";
            document.getElementById('reveal-btn').style.display = "block";
            document.getElementById('next-btn').style.display = "none";
            
            let curScore = masteryScores[current.uid] || 0;
            document.getElementById('word-stats').innerText = `Mastery: ${curScore}/10`;

            const display = document.getElementById('w-main');
            const sub = document.getElementById('w-sub');
            const task = document.getElementById('task');

            if(current.activeTense) delete current.activeTense;

            if (mode === 'en-jp') {
                display.innerText = current.eng;
                sub.innerText = "Translate to Japanese";
                task.innerHTML = "Type the <strong>Romaji / Dict. Form</strong>";
            } else if (mode === 'jp-en') {
                display.innerText = current.kanji || current.dict;
                sub.innerText = current.dict;
                task.innerHTML = "Type the <strong>English</strong> meaning";
            } else {
                display.innerText = current.kanji || current.dict;
                // Modified line to append the English meaning below the main Romaji word
                sub.innerText = `${current.dict} (${current.eng})`;
                
                let tPool = [];
                if (current.group) tPool = tenses.verbs;
                else if (current.type) tPool = tenses.adjectives.filter(t => t.type === current.type);
                
                if (tPool.length > 0) {
                    current.activeTense = tPool[Math.floor(Math.random() * tPool.length)];
                    task.innerHTML = `Conjugate to: <strong>${current.activeTense.label}</strong>`;
                } else {
                    task.innerHTML = "<em>No Conjugation available! Type the English word instead.</em>";
                }
            }
            document.getElementById('user-input').focus();
        }

        function check() {
            const user = document.getElementById('user-input').value.toLowerCase().trim().replace(/\s/g, '');
            let correct = getCorrectAnswer();
            correct = correct.toLowerCase().replace(/\s/g, '');

            const fb = document.getElementById('feedback');
            if (user === correct) {
                fb.innerText = "Correct! ✨"; fb.style.color = "#2ecc71"; 
                score++;
                updateMasteryScore(1); 
            } else {
                fb.innerText = `Oops! Correct answer: ${correct}`; fb.style.color = "#e74c3c";
                updateMasteryScore(-1); 
            }
            document.getElementById('score').innerText = `Session Score: ${score}`;
            document.getElementById('user-input').disabled = true;
            document.getElementById('submit-btn').style.display = "none";
            document.getElementById('reveal-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
            document.getElementById('next-btn').focus();
        }
        
        next();
    </script>
</body>
</html>
