<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JP Study Hub</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --bg: #f0f3f7; 
            --card: #ffffff; 
        }
        
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            /* Uses Dynamic/Short Viewport Height to naturally scale when keyboard opens */
            min-height: 100vh;
            min-height: 100svh; 
            overflow-x: hidden;
        }
        
        /* Layout Container to prevent jumping when keyboard opens */
        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .section-label { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: #888; 
            width: 100%; 
            margin: 6px 0 2px 4px; 
            font-weight: bold; 
        }
        
        /* Horizontal scroll menus */
        .menu-scroll { 
            display: flex; 
            gap: 6px; 
            overflow-x: auto; 
            width: 100%; 
            padding-bottom: 6px; 
            -webkit-overflow-scrolling: touch; 
        }
        .menu-scroll::-webkit-scrollbar { display: none; }
        .menu-scroll button { 
            white-space: nowrap; 
            padding: 8px 14px; 
            border-radius: 20px; 
            border: 2px solid var(--primary); 
            background: white; 
            font-weight: bold; 
            font-size: 12px; 
            flex-shrink: 0; 
            cursor: pointer; 
        }
        .menu-scroll button.active { background: var(--primary); color: white; }

        .card { 
            background: var(--card); 
            width: 100%; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            padding: 15px; 
            margin-top: 4px; 
            display: flex;
            flex-direction: column;
        }
        
        /* Tighter display padding for mobile keyboards */
        .display-box { 
            background: #f8fbff; 
            padding: 18px 10px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            text-align: center; 
            border: 1px solid #eef2f8; 
        }
        .main-word { font-size: 2.2rem; margin: 0; color: #1a1a1a; }
        .w-sub-style { color: #888; margin: 6px 0 0 0; font-size: 14px; }
        .task-hint { background: #fff8eb; padding: 10px; border-radius: 12px; font-weight: bold; border-left: 5px solid #ffa500; margin-bottom: 12px; font-size: 13px; }
