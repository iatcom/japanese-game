<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jp Master Mobile</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f8fafd; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Mobile Menu Scrollable */
        .nav-menu { display: flex; gap: 8px; overflow-x: auto; width: 100%; padding: 10px 0; scrollbar-width: none; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .nav-menu button { white-space: nowrap; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--primary); background: white; font-weight: bold; font-size: 14px; }
        .nav-menu button.active { background: var(--primary); color: white; }

        .card { background: var(--card); width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 25px; box-sizing: border-box; }
        .word-box { background: #f0f7ff; padding: 40px 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .main-word { font-size: 3.2rem; margin: 0; color: #222; }
        .task-label { background: #fff4e5; padding: 12px; border-radius: 12px; font-weight: bold; border-left: 5px solid #ffa500; margin-bottom: 20px; font-size: 15px; }
        
        input { width: 100%; padding: 18px; font-size: 1.2rem; border: 2px solid #e0e0e0; border-radius: 16px; outline: none; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }

        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 16px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #submit-btn { background: var(--primary); color: white; }
        #next-btn { background: #2ecc71; color: white; display: none; }
        .feedback { margin-top: 20px; text-align: center; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <button onclick="setCat('verbs')" id="cat-verbs" class="active">Verbs</button>
        <button onclick="setCat('adjectives')" id="cat-adjectives">Adjectives</button>
        <button onclick="setCat('days_month')" id="cat-days_month">Days/Month</button>
    </div>

    <div class="card">
        <div id="score-display" style="text-align: right; color: var(--primary); margin-bottom: 10px; font-weight: bold;">Score: 0</div>
        
        <div class="word-box">
            <h1 class="main-word" id="word-main">---</h1>
            <p id="word-sub" style="color: #666; font-size: 1.1rem; margin: 10px 0 0 0;">---</p>
        </div>

        <div class="task-label" id="task-text">---</div>

        <input type="text" id="answer-input" placeholder="Type answer..." spellcheck="false" autocomplete="off">
        
        <div id="feedback" class="feedback"></div>

        <div class="btn-group">
            <button class="btn" id="submit-btn" onclick="check()">Check</button>
            <button class="btn" id="next-btn" onclick="next()">Next →</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let currentCat = 'verbs';
        let item, tense, score = 0;

        function setCat(c) {
            currentCat = c;
            document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
            document.getElementById('cat-'+c).classList.add('active');
            next();
        }

        function next() {
            const list = studyData[currentCat];
            item = list[Math.floor(Math.random() * list.length)];
            
            document.getElementById('word-main').innerText = item.kanji;
            document.getElementById('word-sub').innerText = item.dict;
            document.getElementById('feedback').innerText = "";
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').disabled = false;
            document.getElementById('submit-btn').style.display = "block";
            document.getElementById('next-btn').style.display = "none";

            const task = document.getElementById('task-text');
            if (tenses[currentCat]) {
                const subTenses = currentCat === 'adjectives' 
                    ? tenses.adjectives.filter(t => t.type === item.type)
                    : tenses.verbs;
                tense = subTenses[Math.floor(Math.random() * subTenses.length)];
                task.innerHTML = `Conjugate: <strong>${tense.label}</strong>`;
            } else {
                tense = null;
                task.innerHTML = `Translate: <strong>English</strong>`;
            }
            document.getElementById('answer-input').focus();
        }

        function check() {
            const user = document.getElementById('answer-input').value.toLowerCase().trim().replace(/\s/g, '');
            let correct;

            if (currentCat === 'adjectives' && tense) {
                correct = (item.type === 'i' ? item.stem + tense.suffix : item.dict + tense.suffix);
            } else if (currentCat === 'verbs' && tense) {
                correct = item.stem + tense.suffix;
            } else {
                correct = item.eng.toLowerCase();
            }
            correct = correct.replace(/\s/g, '');

            const fb = document.getElementById('feedback');
            if (user === correct) {
                fb.innerText = "Correct! ✨";
                fb.style.color = "#2ecc71";
                score++;
            } else {
                fb.innerText = `Incorrect: ${correct}`;
                fb.style.color = "#e74c3c";
            }
            document.getElementById('score-display').innerText = `Score: ${score}`;
            document.getElementById('answer-input').disabled = true;
            document.getElementById('submit-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
        }
        next();
    </script>
</body>
</html>
