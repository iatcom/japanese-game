<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JP Study Hub</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --bg: #f0f3f7; 
            --card: #ffffff; 
            --text: #1a1a1a;
            --muted: #666;
            --accent: #e67e22;
        }
        
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            min-height: 100svh; 
            overflow-x: hidden;
        }
        
        .app-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .section-label { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: #888; 
            width: 100%; 
            margin: 6px 0 2px 4px; 
            font-weight: bold; 
        }
        
        .menu-scroll { 
            display: flex; 
            gap: 6px; 
            overflow-x: auto; 
            width: 100%; 
            padding-bottom: 6px; 
            -webkit-overflow-scrolling: touch; 
            scroll-behavior: smooth;
        }
        .menu-scroll::-webkit-scrollbar { display: none; }
        .menu-scroll button { 
            white-space: nowrap; 
            padding: 8px 14px; 
            border-radius: 20px; 
            border: 2px solid var(--primary); 
            background: white; 
            font-weight: bold; 
            font-size: 12px; 
            flex-shrink: 0; 
            cursor: pointer; 
        }
        .menu-scroll button.active { background: var(--primary); color: white; }

        /* Selector Dropdowns */
        .select-input {
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #333;
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            margin-bottom: 4px;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234a90e2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }
        .select-input:focus {
            border-color: var(--primary);
        }

        .card { 
            background: var(--card); 
            width: 100%; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            padding: 15px; 
            margin-top: 4px; 
            display: flex;
            flex-direction: column;
        }
        
        .display-box { 
            background: #f8fbff; 
            padding: 18px 10px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            text-align: center; 
            border: 1px solid #eef2f8; 
        }
        .main-word { font-size: 2.2rem; margin: 0; color: var(--text); }
        .w-sub-style { color: #888; margin: 6px 0 0 0; font-size: 14px; }
        .task-hint { background: #fff8eb; padding: 10px; border-radius: 12px; font-weight: bold; border-left: 5px solid #ffa500; margin-bottom: 12px; font-size: 13px; }
