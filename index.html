<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Verb Master Pro</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .menu {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu button {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .menu button.active {
            background: var(--primary);
            color: white;
        }

        .game-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .verb-display {
            background: #f0f4f8;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-word { font-size: 3.5rem; margin: 0; color: #1a1a1a; }
        .sub-word { font-size: 1.2rem; color: #7f8c8d; margin: 5px 0; }

        .task-box {
            font-size: 1.1rem;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #fff9f0;
            border-left: 5px solid var(--secondary);
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .controls { margin-top: 20px; display: flex; gap: 10px; }

        .btn-action {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        #submit-btn { background: var(--primary); }
        #next-btn { background: var(--success); display: none; }

        .feedback { margin-top: 15px; min-height: 24px; font-weight: bold; }
        .correct { color: var(--success); }
        .wrong { color: var(--danger); }
    </style>
</head>
<body>

    <div class="menu" id="mode-menu">
        <button onclick="setMode('en-jp')" id="btn-en-jp">English → JP</button>
        <button onclick="setMode('jp-en')" id="btn-jp-en">JP → English</button>
        <button onclick="setMode('conjugate')" id="btn-conjugate" class="active">Conjugation</button>
    </div>

    <div class="game-card">
        <div class="stats">
            <span>Score: <span id="score">0</span></span>
            <span id="group-tag">Group 1</span>
        </div>

        <div class="verb-display">
            <h1 class="main-word" id="display-word">---</h1>
            <p class="sub-word" id="display-sub">---</p>
        </div>

        <div class="task-box" id="task-text">
            Conjugate to: <strong>Present Positive</strong>
        </div>

        <input type="text" id="user-input" placeholder="Type answer..." autocomplete="off">
        
        <div id="feedback" class="feedback"></div>

        <div class="controls">
            <button class="btn-action" id="submit-btn">Check</button>
            <button class="btn-action" id="next-btn">Next →</button>
        </div>
    </div>

<script>
    const verbs = [
        { dict: "Kiku", kanji: "聞く", eng: "Listen", group: 1, stem: "kiki" },
        { dict: "Oyogu", kanji: "泳ぐ", eng: "Swim", group: 1, stem: "oyogi" },
        { dict: "Hanasu", kanji: "話す", eng: "Talk", group: 1, stem: "hanashi" },
        { dict: "Yomu", kanji: "読む", eng: "Read", group: 1, stem: "yomi" },
        { dict: "Taberu", kanji: "食べる", eng: "Eat", group: 2, stem: "tabe" },
        { dict: "Miru", kanji: "見る", eng: "See", group: 2, stem: "mi" },
        { dict: "Suru", kanji: "する", eng: "Do", group: 3, stem: "shi" },
        { dict: "Kuru", kanji: "来る", eng: "Come", group: 3, stem: "ki" },
        { dict: "Hashiru", kanji: "走る", eng: "Run", group: 1, stem: "hashiri" }, // Exception
        { dict: "Kaeru", kanji: "帰る", eng: "Return", group: 1, stem: "kaeri" }  // Exception
    ];

    const tenses = [
        { label: "Present Positive", suffix: "masu" },
        { label: "Present Negative", suffix: "masen" },
        { label: "Past Positive", suffix: "mashita" },
        { label: "Past Negative", suffix: "masen deshita" }
    ];

    let currentMode = 'conjugate';
    let currentVerb, currentTense, score = 0;

    const els = {
        word: document.getElementById('display-word'),
        sub: document.getElementById('display-sub'),
        task: document.getElementById('task-text'),
        group: document.getElementById('group-tag'),
        input: document.getElementById('user-input'),
        feedback: document.getElementById('feedback'),
        score: document.getElementById('score'),
        submit: document.getElementById('submit-btn'),
        next: document.getElementById('next-btn')
    };

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        nextQuestion();
    }

    function nextQuestion() {
        currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
        currentTense = tenses[Math.floor(Math.random() * tenses.length)];
        
        els.feedback.innerText = "";
        els.input.value = "";
        els.input.disabled = false;
        els.submit.style.display = "block";
        els.next.style.display = "none";

        if (currentMode === 'en-jp') {
            els.word.innerText = currentVerb.eng;
            els.sub.innerText = "Translate to Japanese";
            els.task.innerHTML = "Type the <strong>Dictionary Form</strong> (Romaji or Kanji)";
            els.group.innerText = "";
        } else if (currentMode === 'jp-en') {
            els.word.innerText = currentVerb.kanji;
            els.sub.innerText = currentVerb.dict;
            els.task.innerHTML = "Translate to <strong>English</strong>";
            els.group.innerText = "";
        } else {
            els.word.innerText = currentVerb.kanji;
            els.sub.innerText = currentVerb.dict;
            els.task.innerHTML = `Conjugate to: <strong>${currentTense.label}</strong>`;
            els.group.innerText = `Group ${currentVerb.group}`;
        }
        els.input.focus();
    }

    function checkAnswer() {
        let correct = [];
        const user = els.input.value.toLowerCase().trim();

        if (currentMode === 'en-jp') {
            correct = [currentVerb.dict.toLowerCase(), currentVerb.kanji];
        } else if (currentMode === 'jp-en') {
            correct = [currentVerb.eng.toLowerCase()];
        } else {
            correct = [(currentVerb.stem + currentTense.suffix).toLowerCase()];
        }

        if (correct.includes(user)) {
            els.feedback.innerText = "Correct! ✨";
            els.feedback.className = "feedback correct";
            score++;
        } else {
            els.feedback.innerText = `Incorrect. Expected: ${correct[0]}`;
            els.feedback.className = "feedback wrong";
        }

        els.score.innerText = score;
        els.input.disabled = true;
        els.submit.style.display = "none";
        els.next.style.display = "block";
    }

    els.submit.onclick = checkAnswer;
    els.next.onclick = nextQuestion;
    els.input.onkeypress = (e) => { if(e.key === 'Enter') checkAnswer(); };

    nextQuestion();
</script>
</body>
</html>
