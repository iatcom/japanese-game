<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Verb Master</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-card {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .verb-display {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .kanji { font-size: 3rem; margin: 0; color: #1a1a1a; }
        .romaji { font-size: 1.2rem; color: #7f8c8d; margin: 5px 0; }
        .meaning { font-style: italic; color: #34495e; }

        .task {
            font-size: 1.1rem;
            margin: 20px 0;
            padding: 10px;
            border-left: 5px solid var(--secondary);
            background: #fff9f0;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        #submit-btn { background: var(--primary); color: white; }
        #next-btn { background: var(--success); color: white; display: none; }
        button:active { transform: scale(0.98); }

        .feedback {
            margin-top: 15px;
            min-height: 24px;
            font-weight: bold;
        }

        .correct { color: var(--success); }
        .wrong { color: var(--danger); }

        .legend {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #95a5a6;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="game-card">
    <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span id="verb-group-tag">Group 1</span>
    </div>

    <div class="verb-display">
        <h1 class="kanji" id="display-kanji">---</h1>
        <p class="romaji" id="display-romaji">---</p>
        <p class="meaning" id="display-meaning">---</p>
    </div>

    <div class="task">
        Conjugate to: <strong id="target-tense">---</strong>
    </div>

    <input type="text" id="user-input" placeholder="Type answer..." autocomplete="off">
    
    <div id="feedback" class="feedback"></div>

    <div class="controls">
        <button id="submit-btn">Check Answer</button>
        <button id="next-btn">Next Verb →</button>
    </div>

    <div class="legend">
        * Conjugation rules based on your class notes[span_0](start_span)[span_0](end_span).<br>
        * Includes Group 1, 2, 3, and Exception verbs[span_1](start_span)[span_1](end_span).
    </div>
</div>

<script>
    const verbs = [
        // Group 1 (Godan)
        { dict: "Kiku", kanji: "聞く", meaning: "To listen", group: 1, stem: "kiki" },
        { dict: "Oyogu", kanji: "泳ぐ", meaning: "To swim", group: 1, stem: "oyogi" },
        { dict: "Hanasu", kanji: "話す", meaning: "To talk", group: 1, stem: "hanashi" },
        { dict: "Yomu", kanji: "読む", meaning: "To read", group: 1, stem: "yomi" },
        { dict: "Shinu", kanji: "死ぬ", meaning: "To die", group: 1, stem: "shini" },
        { dict: "Yobu", kanji: "呼ぶ", meaning: "To call", group: 1, stem: "yobi" },
        { dict: "Iu", kanji: "言う", meaning: "To say", group: 1, stem: "ii" },
        { dict: "Matsu", kanji: "待つ", meaning: "To wait", group: 1, stem: "machi" },
        { dict: "Toru", kanji: "取る", meaning: "To take", group: 1, stem: "tori" },
        { dict: "Katsu", kanji: "勝つ", meaning: "To win", group: 1, stem: "kachi" },
        { dict: "Au", kanji: "会う", meaning: "To meet", group: 1, stem: "ai" },
        { dict: "Iku", kanji: "行く", meaning: "To go", group: 1, stem: "iki" },
        { dict: "Nomu", kanji: "飲む", meaning: "To drink", group: 1, stem: "nomi" },
        
        // Group 2 (Ichidan)
        { dict: "Taberu", kanji: "食べる", meaning: "To eat", group: 2, stem: "tabe" },
        { dict: "Neru", kanji: "寝る", meaning: "To sleep", group: 2, stem: "ne" },
        { dict: "Miru", kanji: "見る", meaning: "To see", group: 2, stem: "mi" },
        { dict: "Okiru", kanji: "起きる", meaning: "To wake", group: 2, stem: "oki" },

        // Group 2/1 (Exceptions - Conjugate like Group 1)
        { dict: "Hashiru", kanji: "走る", meaning: "To run", group: 1, stem: "hashiri" },
        { dict: "Kaeru", kanji: "帰る", meaning: "To come back", group: 1, stem: "kaeri" },
        { dict: "Shiru", kanji: "知る", meaning: "To know", group: 1, stem: "shiri" },
        { dict: "Hairu", kanji: "入る", meaning: "To enter", group: 1, stem: "hairi" },

        // Group 3 (Irregular)
        { dict: "Suru", kanji: "する", meaning: "To do", group: 3, stem: "shi" },
        { dict: "Kuru", kanji: "来る", meaning: "To come", group: 3, stem: "ki" }
    ];

    const tenses = [
        { label: "Present (+masu)", suffix: "masu" },
        { label: "Neg Present (+masen)", suffix: "masen" },
        { label: "Past (+mashita)", suffix: "mashita" },
        { label: "Neg Past (+masen deshita)", suffix: "masen deshita" }
    ];

    let currentVerb, currentTense, score = 0;

    const elements = {
        kanji: document.getElementById('display-kanji'),
        romaji: document.getElementById('display-romaji'),
        meaning: document.getElementById('display-meaning'),
        tense: document.getElementById('target-tense'),
        group: document.getElementById('verb-group-tag'),
        input: document.getElementById('user-input'),
        feedback: document.getElementById('feedback'),
        score: document.getElementById('score'),
        submitBtn: document.getElementById('submit-btn'),
        nextBtn: document.getElementById('next-btn')
    };

    function nextQuestion() {
        currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
        currentTense = tenses[Math.floor(Math.random() * tenses.length)];

        elements.kanji.innerText = currentVerb.kanji;
        elements.romaji.innerText = currentVerb.dict;
        elements.meaning.innerText = currentVerb.meaning;
        elements.tense.innerText = currentTense.label;
        elements.group.innerText = `Group ${currentVerb.group}`;
        
        elements.input.value = "";
        elements.input.disabled = false;
        elements.feedback.innerText = "";
        elements.submitBtn.style.display = "block";
        elements.nextBtn.style.display = "none";
        elements.input.focus();
    }

    function checkAnswer() {
        const correctStr = (currentVerb.stem + currentTense.suffix).toLowerCase().replace(/\s/g, '');
        const userStr = elements.input.value.toLowerCase().trim().replace(/\s/g, '');

        if (userStr === correctStr) {
            elements.feedback.innerText = "Correct! ✨";
            elements.feedback.className = "feedback correct";
            score++;
        } else {
            elements.feedback.innerText = `Wrong. Correct: ${currentVerb.stem}${currentTense.suffix}`;
            elements.feedback.className = "feedback wrong";
        }

        elements.score.innerText = score;
        elements.input.disabled = true;
        elements.submitBtn.style.display = "none";
        elements.nextBtn.style.display = "block";
    }

    elements.submitBtn.onclick = checkAnswer;
    elements.nextBtn.onclick = nextQuestion;
    elements.input.onkeypress = (e) => { if(e.key === 'Enter') checkAnswer(); };

    nextQuestion();
</script>

</body>
</html>
